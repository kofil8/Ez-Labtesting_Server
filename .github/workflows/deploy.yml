name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn prisma:generate

      - name: Build
        run: yarn build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Deploy over SSH with rollback
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          DEPLOY_BRANCH: main
          PM2_APP_NAME: ${{ secrets.BACKEND_PM2_APP_NAME }}
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ${{ secrets.BACKEND_EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.BACKEND_EC2_PORT }}
          envs: APP_DIR,DEPLOY_BRANCH,PM2_APP_NAME
          script_stop: true
          script: |
            set -euo pipefail

            cd "$APP_DIR"

            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            rollback() {
              echo "Deployment failed. Rolling back to $PREVIOUS_COMMIT"

              git reset --hard "$PREVIOUS_COMMIT"

              corepack enable || true
              yarn install --frozen-lockfile
              yarn prisma:generate
              yarn build

              if pm2 describe "$PM2_APP_NAME" >/dev/null 2>&1; then
                pm2 reload "$PM2_APP_NAME" --update-env
              else
                pm2 start dist/server.js --name "$PM2_APP_NAME" --update-env
              fi

              pm2 save
            }

            trap rollback ERR

            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            corepack enable || true
            yarn install --frozen-lockfile

            yarn prisma:generate
            yarn prisma:migrate:deploy
            yarn build

            if pm2 describe "$PM2_APP_NAME" >/dev/null 2>&1; then
              pm2 reload "$PM2_APP_NAME" --update-env
            else
              pm2 start dist/server.js --name "$PM2_APP_NAME" --update-env
            fi

            pm2 save

            trap - ERR
            echo "Deployment successful"

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '✅ Backend deployed successfully'
          to: ${{ secrets.DEPLOY_NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_FROM_EMAIL }}
          body: |
            Backend deployed successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '❌ Backend deploy failed'
          to: ${{ secrets.DEPLOY_NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_FROM_EMAIL }}
          body: |
            Backend deployment failed.

            Auto rollback was attempted on EC2.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
